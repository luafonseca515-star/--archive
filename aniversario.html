<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=0.5">

<title>?</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Lobster&display=swap" rel="stylesheet">

</head>
<script>

const stars = document.getElementById("stars");

for(let i = 0; i < 30; i++){

const star = document.createElement("div");

star.innerHTML = "⭐";

star.style.position = "fixed";
star.style.left = Math.random() * 100 + "vw";
star.style.top = "-20px";

star.style.fontSize =
(Math.random() * 10 + 10) + "px";

star.style.animation =
`fall ${Math.random() * 5 + 5}s linear infinite`;

star.style.animationDelay =
Math.random() * 5 + "s";

star.style.pointerEvents = "none";

stars.appendChild(star);

}

</script>
  
<body>
<div id="stars"></div>
<div class="menu-icon" onclick="toggleMenu()">☆</div>

<div id="menu" class="menu">
<a href="index.html">Início</a>
<a href="poemas.html">Poemas</a>
<a href="mensagens.html">Mensagens</a>
<a href="interativo.html">Interativo</a>
<a href="aniversario.html">?</a>
</div>

<div id="conteudo">pagina-aniversario</div>

<script>

function toggleMenu() {
  var menu = document.getElementById("menu");

  if (menu.style.display === "block") {
    menu.style.display = "none";
  } else {
    menu.style.display = "block";
  }
}

const agora = new Date();

const liberado = true
agora.getDate() === 10 &&
agora.getMonth() === 5;

const conteudo =
document.getElementById("conteudo");

if(liberado){

conteudo.innerHTML = `
<h1>Feliz Aniversário!</h1>

<p>
Qual a minha palavra favorita?
(dica: foi dita em call)
</p>

<input
type="password"
id="senha"
oninput="limparMensagem()"
>

<button onclick="verificarSenha()">
Entrar
</button>

<div id="resultado"></div>
`;

}else{

conteudo.innerHTML = `
<h1>☆</h1>

<p>
Surpresa! Volte mais tarde.
</p>
`;

}
function limparMensagem(){

document.getElementById("resultado").innerHTML = "";

}
function verificarSenha(){

const senha =
document.getElementById("senha").value;

if(senha.toLowerCase() === "pipi"){

window.location.href =
"presente.html";

}else{

document.getElementById("resultado")
.innerHTML =
"<span class='erro-senha'>Você claramente não é minha namorada</span>";

}

}

</script>

</body>
</html>
