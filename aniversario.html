<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=0.5">

<title>?</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Lobster&display=swap" rel="stylesheet">

</head>

<body>

<div class="stars" id="stars"></div>

<div class="menu-icon" onclick="toggleMenu()">☆</div>

<div id="menu" class="menu">
<a href="index.html">Início</a>
<a href="poemas.html">Poemas</a>
<a href="mensagens.html">Mensagens</a>
<a href="interativo.html">Interativo</a>
<a href="aniversario.html">?</a>
</div>

<img src="surpresa.jpeg" class="imagem-topo">
  
<div id="conteudo" class="pagina-aniversario"></div>

<script>

function toggleMenu(){

var menu = document.getElementById("menu");

if(menu.style.display === "block"){

menu.style.display = "none";

}else{

menu.style.display = "block";

}

}

const agora = new Date();

const liberado = true;

const conteudo =
document.getElementById("conteudo");

if(liberado){
  
conteudo.innerHTML = `
<h1>Surpresa!</h1>

<p>
Qual a minha palavra favorita? (dica: foi dita em call)
</p>

<input
type="password"
id="senha"
oninput="limparMensagem()"
>

<button onclick="verificarSenha()">
Entrar
</button>

<div id="resultado"></div>
`;

}else{

conteudo.innerHTML = `
<h1>☆</h1>

<p>
Surpresa! Volte mais tarde.
</p>
`;

}

function limparMensagem(){

const resultado =
document.getElementById("resultado");

if(resultado){
resultado.innerHTML = "";
}

}

function verificarSenha(){

const senha =
document.getElementById("senha").value;

if(senha.toLowerCase() === "pipi"){

window.location.href =
"presente.html";

}else{

document.getElementById("resultado").innerHTML =
"<span class='erro-senha'>Você claramente não é minha namorada</span>";

}

} 
  
/* ESTRELAS */

const starsContainer =
document.getElementById("stars");

const estrelas =
["★","✦","✧","⋆","☆"];

for(let i=0; i<40; i++){

let star =
document.createElement("div");

star.classList.add("star");

star.innerHTML =
estrelas[Math.floor(Math.random()*estrelas.length)];

star.style.left =
Math.random()*100 + "vw";

star.style.fontSize =
(10 + Math.random()*20) + "px";

star.style.animationDuration =
(4 + Math.random()*6) + "s";

starsContainer.appendChild(star);

}

</script>

<img src="datacomemorativa.jpeg" class="imagem-final">
  
</body>
</html>
