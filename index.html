<!DOCTYPE html>
<html>

<head>
  <title>nós</title>

  <style>
    body {
      background: #0f0f0f;
      color: white;
      font-family: Arial;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      flex-direction: column;
      text-align: center;
    }

    h1 {
      font-size: 40px;
    }

    p {
      font-size: 25px;
    }
  </style>
</head>

<body>

  <h1>eu te amo há:</h1>

  <p id="timer"></p>

  <script>
    const startDate = new Date("2023-08-16");

    function updateTimer() {
      const now = new Date();
      const difference = now - startDate;

      const days = Math.floor(difference / (1000 * 60 * 60 * 24));
      const hours = Math.floor((difference / (1000 * 60 * 60)) % 24);

      document.getElementById("timer").innerHTML =
        days + " dias e " + hours + " horas";
    }

    setInterval(updateTimer, 1000);

  </script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>nós duas</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      background: #0d0d0d;
      overflow: hidden;
      color: white;
      font-family: Georgia, serif;

      display: flex;
      justify-content: center;
      align-items: center;

      height: 100vh;
      text-align: center;
    }

    .container {
      z-index: 2;
      padding: 20px;
    }

    h1 {
      font-size: 40px;
      margin-bottom: 10px;
    }

    #timer {
      font-size: 28px;
      opacity: 0.9;
    }

    .quote {
      margin-top: 25px;
      font-size: 16px;
      opacity: 0.7;
      max-width: 300px;
    }

    .stars {
      position: absolute;
      width: 100%;
      height: 100%;
      background:
        radial-gradient(white, rgba(255,255,255,0)) 1px 1px/50px 50px;
      animation: moveStars 40s linear infinite;
      opacity: 0.4;
    }

    @keyframes moveStars {
      from {
        transform: translateY(0);
      }

      to {
        transform: translateY(-100px);
      }
    }

    iframe {
      margin-top: 30px;
      border-radius: 12px;
    }
  </style>
</head>

<body>

  <div class="stars"></div>

  <div class="container">

    <h1>desde que você apareceu:</h1>

    <div id="timer"></div>

    <div class="quote">
      você transformou pequenas coisas em coisas importantes.
    </div>

    <iframe style="border-radius:12px"
      src="https://open.spotify.com/embed/track/1VQJvVQd6OnXhA0f7pQ4nD?utm_source=generator"
      width="300"
      height="80"
      frameBorder="0"
      allowfullscreen=""
      allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture">
    </iframe>

  </div>

  <script>

    const startDate = new Date("2023-08-16");

    function updateTimer() {

      const now = new Date();

      const difference = now - startDate;

      const days = Math.floor(difference / (1000 * 60 * 60 * 24));

      const hours = Math.floor((difference / (1000 * 60 * 60)) % 24);

      const minutes = Math.floor((difference / (1000 * 60)) % 60);

      document.getElementById("timer").innerHTML =
        days + " dias, "
        + hours + " horas e "
        + minutes + " minutos";
    }

    updateTimer();

    setInterval(updateTimer, 1000);

  </script>

</body>

</html>
